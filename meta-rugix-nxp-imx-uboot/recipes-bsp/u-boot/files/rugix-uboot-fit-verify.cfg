# Enable FIT image signature verification so U-Boot rejects unsigned or
# tampered FIT images at boot. The public key is embedded in U-Boot's
# device tree by uboot-sign.bbclass at build time.
CONFIG_FIT_SIGNATURE=y
CONFIG_RSA=y

# Lock down the interactive U-Boot shell.
CONFIG_BOOTDELAY=-2
CONFIG_PANIC_HANG=y
