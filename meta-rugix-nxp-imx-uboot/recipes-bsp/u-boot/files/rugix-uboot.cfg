# Rugix loads U-Boot env from a file on the FAT boot partition at runtime
# (via `env import` in boot.scr) and persists it with `fatwrite`, rather
# than relying on a Kconfig-baked storage location. This decouples the
# env location from the build-time defconfig so the same U-Boot binary
# works for SD boot and eMMC boot. U-Boot uses `${mmc_bootdev}` from the
# BootROM to pick the right device at runtime.
CONFIG_ENV_IS_NOWHERE=y
# CONFIG_ENV_IS_IN_MMC is not set
# CONFIG_ENV_IS_IN_FAT is not set
# CONFIG_ENV_IS_IN_SPI_FLASH is not set

# Needed by boot.scr to persist rugix_bootpart / rugix_boot_spare back
# to the FAT boot partition via `fatwrite`.
CONFIG_CMD_FAT=y
CONFIG_FAT_WRITE=y

# Match fw_env.config's size on the userspace side.
CONFIG_ENV_SIZE=0x4000
