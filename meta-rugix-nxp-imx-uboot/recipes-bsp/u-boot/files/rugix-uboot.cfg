# No compiled-in env storage. Auto-loading env from disk would let an
# attacker inject any U-Boot variable (bootcmd, bootargs, ...) and
# bypass verified boot. Rugix's runtime state is imported via the
# FIT-signed boot.scr instead. The other env backends bake in a fixed
# MMC device at build time, so dropping them also means one U-Boot
# binary covers SD and eMMC.
CONFIG_ENV_IS_NOWHERE=y
# CONFIG_ENV_IS_IN_MMC is not set
# CONFIG_ENV_IS_IN_FAT is not set
# CONFIG_ENV_IS_IN_SPI_FLASH is not set

# Needed by boot.scr to fatload the slot FIT from the boot partition
# and to fatwrite rugix_bootpart / rugix_boot_spare back to the config
# partition.
CONFIG_CMD_FAT=y
CONFIG_FAT_WRITE=y

# Match fw_env.config's size on the userspace side.
CONFIG_ENV_SIZE=0x4000

# Rugix uses FIT images to deliver kernel, device tree, and initramfs
# as a single bootable artifact. `bootm` in boot.scr parses the FIT
# header and extracts the components.
CONFIG_FIT=y

# Reject non-FIT payloads. Rugix only ever delivers a FIT; keeping the
# legacy format enabled is an attack surface that bypasses FIT signature
# verification when UBOOT_SIGN_ENABLE=1.
# CONFIG_LEGACY_IMAGE_FORMAT is not set

# The boot script uses `fdt addr` and `fdt get value` to read bootargs
# (e.g. dm-verity root hash) from the FIT image before booting.
CONFIG_CMD_FDT=y
