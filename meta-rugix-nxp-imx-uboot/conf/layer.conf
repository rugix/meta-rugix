BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-rugix-nxp-imx-uboot"
BBFILE_PATTERN_meta-rugix-nxp-imx-uboot = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-rugix-nxp-imx-uboot = "10"

LAYERDEPENDS_meta-rugix-nxp-imx-uboot = "core meta-rugix-core freescale-layer"
LAYERSERIES_COMPAT_meta-rugix-nxp-imx-uboot = "scarthgap"

WKS_FILE:imx-nxp-bsp ?= "sdimage-rugix-nxp-imx-uboot.wks.in"
WKS_FILE_DEPENDS:append:imx-nxp-bsp = " imx-boot virtual/bootloader rugix-bootstrap-marker"
RUGIX_SLOTS:imx-nxp-bsp ?= "system:2"
IMAGE_INSTALL:append:imx-nxp-bsp = "${@bb.utils.contains('DISTRO_FEATURES', 'rugix', ' packagegroup-rugix-bsp', '', d)}"

# Rugix owns the FAT boot partition. Override (not append) IMAGE_BOOT_FILES
# so the NXP-default kernel/dtb do NOT end up there - we read kernel + dtb
# from /boot of the rootfs instead, so kernel + rootfs update atomically in
# the A/B flow. Only `boot.scr` (the A/B selector script, compiled by
# u-boot.inc from our boot.cmd) and the Rugix bootstrap marker live on the
# FAT boot partition.
IMAGE_BOOT_FILES:imx-nxp-bsp = "boot.scr rugix-bootstrap;rugix/bootstrap"
