BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-rugix-nxp-imx-uboot"
BBFILE_PATTERN_meta-rugix-nxp-imx-uboot = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-rugix-nxp-imx-uboot = "10"

LAYERDEPENDS_meta-rugix-nxp-imx-uboot = "core meta-rugix-core freescale-layer"
LAYERSERIES_COMPAT_meta-rugix-nxp-imx-uboot = "scarthgap"

WKS_FILE:imx-nxp-bsp ?= "sdimage-rugix-nxp-imx-uboot.wks.in"
WKS_FILE_DEPENDS:append:imx-nxp-bsp = " imx-boot virtual/bootloader rugix-bootstrap-marker rugix-boot-script"
RUGIX_SLOTS:imx-nxp-bsp ?= "boot:file:${IMGDEPLOYDIR}/${IMAGE_LINK_NAME}.boot.img system:file:${IMGDEPLOYDIR}/${IMAGE_LINK_NAME}.ext4.verity"

# Size of the per-slot boot partition reserved in the partition table and via
# bootstrapping. The actual FAT image that fit-boot-img.bbclass produces is
# sized to fit the current FIT; the partition just needs to be at least that
# large.
RUGIX_BOOT_SIZE:imx-nxp-bsp ?= "96MiB"
IMAGE_INSTALL:append:imx-nxp-bsp = "${@bb.utils.contains('DISTRO_FEATURES', 'rugix', ' packagegroup-rugix-bsp', '', d)}"

# Build the kernel as a FIT image (kernel + DTBs + initramfs). Rugix then
# post-processes the FIT at image time to stamp in the slot's dm-verity root
# hash via fit-boot-img.bbclass.
KERNEL_CLASSES:append:imx-nxp-bsp = "${@bb.utils.contains('DISTRO_FEATURES', 'rugix', ' kernel-fitimage', '', d)}"
KERNEL_IMAGETYPES:imx-nxp-bsp = "${@bb.utils.contains('DISTRO_FEATURES', 'rugix', 'fitImage', 'Image', d)}"
INITRAMFS_IMAGE:imx-nxp-bsp ?= "${@bb.utils.contains('DISTRO_FEATURES', 'rugix', 'verity-initramfs', '', d)}"
INITRAMFS_IMAGE_BUNDLE:imx-nxp-bsp ?= "0"

# Reserve padding in the FIT so fit-boot-img.bbclass can inject the bootargs
# property at image time without having to reassemble the FIT.
UBOOT_MKIMAGE_DTCOPTS:imx-nxp-bsp ?= "-I dts -O dtb -p 2000"

IMAGE_CLASSES:append:imx-nxp-bsp = "${@bb.utils.contains('DISTRO_FEATURES', 'rugix', ' image_types_verity fit-boot-img', '', d)}"

# NXP's imx-base.inc does not set UBOOT_ENTRYPOINT for i.MX9.
UBOOT_ENTRYPOINT:mx9-nxp-bsp ?= "0x80400000"
UBOOT_LOADADDRESS:mx9-nxp-bsp ?= "0x80400000"

# FDT load address for FIT extraction. Must differ from the FIT staging address
# so U-Boot doesn't expand the DTB over the ramdisk in the FIT.
UBOOT_DTB_LOADADDRESS:mx9-nxp-bsp ?= "0x83000000"

IMAGE_FSTYPES:append:imx-nxp-bsp = "${@bb.utils.contains('DISTRO_FEATURES', 'rugix', ' ext4 verity', '', d)}"
EXTRA_IMAGECMD:ext4:append:imx-nxp-bsp = "${@bb.utils.contains('DISTRO_FEATURES', 'rugix', ' -b 4096 -O ^has_journal', '', d)}"

# Rugix owns the FAT config partition. Override (not append) IMAGE_BOOT_FILES
# so NXP-default kernel/dtb do NOT end up there. Only the boot script and
# bootstrap marker live on the config partition; the A/B FITs live in their own
# per-slot FAT images built by fit-boot-img.bbclass.
IMAGE_BOOT_FILES:imx-nxp-bsp = "boot.scr rugix-bootstrap;rugix/bootstrap"
