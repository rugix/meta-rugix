# Rugix GRUB configuration for A/B system updates.
#
# Boot state is managed by rugix-ctrl via grubenv files on the EFI partition.

set default=0
set timeout=3

# Defaults before grubenv files exist (first boot).
set rugpi_bootpart=2
set rugpi_boot_spare=false

# Load Rugix boot state from config partition.
if [ -f /rugpi/primary.grubenv ]; then
    load_env --file /rugpi/primary.grubenv
fi
if [ -f /rugpi/boot_spare.grubenv ]; then
    load_env --file /rugpi/boot_spare.grubenv
fi

# Determine which system partition to boot.
if [ "$rugpi_boot_spare" = "true" ]; then
    # Clear the one-shot flag so the next reboot falls back to the default.
    set rugpi_boot_spare=false
    save_env --file /rugpi/boot_spare.grubenv rugpi_boot_spare
    if [ "$rugpi_bootpart" = "2" ]; then
        set bootpart=3
    else
        set bootpart=2
    fi
else
    set bootpart=$rugpi_bootpart
fi

menuentry "Rugix System" {
    linux (hd0,gpt${bootpart})/boot/bzImage root=/dev/sda${bootpart} init=/usr/bin/rugix-ctrl ro console=ttyS0,115200 panic=60
}
