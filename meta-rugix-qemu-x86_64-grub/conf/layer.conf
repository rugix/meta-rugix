BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-rugix-qemu-x86_64-grub"
BBFILE_PATTERN_meta-rugix-qemu-x86_64-grub = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-rugix-qemu-x86_64-grub = "10"

LAYERDEPENDS_meta-rugix-qemu-x86_64-grub = "core meta-rugix-core"
LAYERSERIES_COMPAT_meta-rugix-qemu-x86_64-grub = "scarthgap"

WKS_FILE:qemux86-64 ?= "qemu-x86_64-rugix-grub-efi.wks"
WKS_FILE_DEPENDS:append:qemux86-64 = " efi-boot-image"
RUGIX_SLOTS:qemux86-64 ?= "system:2"
IMAGE_INSTALL:append:qemux86-64 = "${@bb.utils.contains('DISTRO_FEATURES', 'rugix', ' packagegroup-rugix-bsp', '', d)}"
