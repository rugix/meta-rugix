# yaml-language-server: $schema=https://raw.githubusercontent.com/siemens/kas/refs/heads/master/kas/schema-kas.json
#
# INCOMPLETE EXAMPLE - NOT A PRODUCTION SECURE-BOOT CONFIGURATION.
#
# FRDM-IMX91 variant with U-Boot FIT image signing turned on. Inherits
# base config (machine, distro, repos, NXP downstream BSP setup) from
# examples/frdm-imx91.yaml; this file only flips signing.
#
# What this example DOES cover:
#   - Rootfs integrity via dm-verity (from the base frdm-imx91 config).
#   - Signed kernel FIT and signed boot.scr, verified by U-Boot at
#     bootm. The dm-verity roothash sits inside the FIT's bootargs, so
#     it is covered by the FIT signature.
#
# What this example DOES NOT cover:
#   - Signing of imx-boot itself (the SPL + U-Boot container the
#     BootROM loads). Without it, the chain of trust starts at U-Boot,
#     not at the ROM - an attacker with storage write access can swap
#     imx-boot for an unsigned U-Boot with FIT_SIGNATURE disabled and
#     the whole scheme collapses.
#
# A production secure boot requires fusing the SoC for HAB/AHAB and
# signing imx-boot with the NXP CST tooling. That is board- and
# policy-specific and is left entirely to the integrator.
#
# Keys: generate an RSA key pair and place it at ${TOPDIR}/keys/ before
# building (i.e. build/keys/ from the kas working directory):
#
#     mkdir -p build/keys
#     openssl genrsa -out build/keys/dev.key 2048
#     openssl req -batch -new -x509 -key build/keys/dev.key \
#         -out build/keys/dev.crt -subj "/CN=Rugix FRDM-IMX91 Dev"

header:
  version: 14
  includes:
    - examples/frdm-imx91.yaml

local_conf_header:
  signing: |
    UBOOT_SIGN_ENABLE = "1"
    UBOOT_SIGN_KEYNAME = "dev"
    UBOOT_SIGN_KEYDIR = "${TOPDIR}/keys"
