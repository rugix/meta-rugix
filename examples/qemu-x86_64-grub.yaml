# yaml-language-server: $schema=https://raw.githubusercontent.com/siemens/kas/refs/heads/master/kas/schema-kas.json
header:
  version: 14
  includes:
    - examples/include/common.yaml

local_conf_header:
  rugix-qemu-x86_64-grub: |
    IMAGE_FSTYPES = "tar.bz2 ext4 wic wic.bmap"
    WKS_FILE = "qemu-x86_64-rugix-grub-efi.wks"
    EXTRA_IMAGEDEPENDS += "ovmf"
    WKS_FILE_DEPENDS:append = " efi-boot-image"
    IMAGE_INSTALL:append = " rugix-system-conf kernel-image"

machine: qemux86-64
distro: poky
target:
  - core-image-minimal
  - update-bundle-minimal

defaults:
  repos:
    branch: scarthgap

repos:
  poky:
    url: https://github.com/yoctoproject/poky.git
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-raspberrypi:
    url: "https://github.com/agherzan/meta-raspberrypi.git"

  meta-openembedded:
    url: "https://github.com/openembedded/meta-openembedded.git"
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-multimedia:
      meta-filesystems:

  meta-lts-mixins-rust:
    url: "https://git.yoctoproject.org/meta-lts-mixins"
    branch: scarthgap/rust

  meta-lts-mixins-uboot:
    url: "https://git.yoctoproject.org/meta-lts-mixins"
    branch: scarthgap/u-boot

  meta-rugix:
    layers:
      meta-rugix-core:
      meta-rugix-qemu-x86_64-grub:
