# yaml-language-server: $schema=https://raw.githubusercontent.com/siemens/kas/refs/heads/master/kas/schema-kas.json
#
# Every base layer is pinned to the exact revision NXP tested for the
# i.MX Yocto Release 6.6.36-2.1.0 (see https://github.com/nxp-imx/imx-manifest/blob/60f49be21dad2ef6daf565619a3a74ec3209ddba/imx-6.6.36-2.1.0.xml).

header:
  version: 14
  includes:
    - examples/include/common.yaml

local_conf_header:
  nxp-imx: |
    # Activate NXP's downstream BSP path. meta-freescale's imx-base.inc
    # defaults IMX_DEFAULT_BSP to "mainline", which uses linux-fslc-imx +
    # u-boot-fslc and community device trees - NONE of which know about
    # imx91frdm. Setting this to "nxp" flips MACHINEOVERRIDES to include
    # `imx-nxp-bsp`, `mx9-nxp-bsp`, etc., which activates linux-imx,
    # u-boot-imx, NXP's firmware blobs, AND every `:imx-nxp-bsp` override
    # in meta-rugix-nxp-imx-uboot. Without this line, every bbappend in
    # our BSP layer is silently inactive.
    IMX_DEFAULT_BSP = "nxp"

    # NXP firmware and codecs ship under non-OSS licenses. Accept them so
    # meta-imx recipes (firmware-imx, imx-mkimage, etc.) unpack and build.
    LICENSE_FLAGS_ACCEPTED += "commercial"
    ACCEPT_FSL_EULA = "1"

    # Force both kernel and u-boot providers to NXP's downstream forks.
    PREFERRED_PROVIDER_virtual/kernel = "linux-imx"
    PREFERRED_PROVIDER_u-boot = "u-boot-imx"
    PREFERRED_PROVIDER_virtual/bootloader = "u-boot-imx"

    # Use latest Git version. This is required because we we need an unreleased
    # change for the dotless bootstrapping marker (remove once 1.1.3 lands).
    PREFERRED_VERSION_rugix-ctrl = "git"
    PREFERRED_VERSION_rugix-bundler-native = "git"

  image-conf: |
    IMAGE_FSTYPES = "tar.bz2 wic wic.bmap rugixb rugixb.hash"
    FIT_CONF_DEFAULT_DTB = "imx91-11x11-frdm.dtb"
    # Override the A/B system partition size (default: 4GiB).
    # RUGIX_SYSTEM_SIZE = "4GiB"

machine: imx91frdm
distro: poky
target:
  - core-image-minimal

repos:
  poky:
    url: https://git.yoctoproject.org/poky
    commit: f43f393ef0246b7bee6eed8bcf8271cf2b8cdf40
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-openembedded:
    url: https://github.com/openembedded/meta-openembedded.git
    commit: 80e01188fa822d87d301ee71973c462d7a865493
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-multimedia:
      meta-filesystems:

  meta-clang:
    url: https://github.com/kraj/meta-clang.git
    commit: fe561f41aef0cff9e6f96730ab59f28dca2eb682

  meta-arm:
    url: https://git.yoctoproject.org/meta-arm
    commit: 1b85bbb4cab9658da3cd926c62038b8559c5c64e
    layers:
      meta-arm:
      meta-arm-toolchain:

  meta-freescale:
    url: https://github.com/Freescale/meta-freescale.git
    commit: 0f8091c63dd8805610c09b08409bc58492a3b16f

  meta-freescale-3rdparty:
    url: https://github.com/Freescale/meta-freescale-3rdparty.git
    commit: 6c063450d464eb2f380443c7d9af1b94ce9b9d75

  meta-freescale-distro:
    url: https://github.com/Freescale/meta-freescale-distro.git
    commit: b9d6a5d9931922558046d230c1f5f4ef6ee72345

  meta-imx:
    url: https://github.com/nxp-imx/meta-imx.git
    tag: rel_imx_6.6.36_2.1.0
    layers:
      meta-imx-bsp:
      meta-imx-sdk:

  # meta-imx-frdm is not part of NXP's imx-manifest. It is a separate layer
  # from nxp-imx-support that adds FRDM-* machine configs on top of meta-imx.
  # Pin to the release branch that matches the meta-imx release above.
  meta-imx-frdm:
    url: https://github.com/nxp-imx-support/meta-imx-frdm.git
    branch: lf-6.6.36-2.1.0
    layers:
      meta-imx-bsp:
      meta-imx-sdk:

  meta-lts-mixins-rust:
    url: https://git.yoctoproject.org/meta-lts-mixins
    branch: scarthgap/rust

  meta-rugix:
    layers:
      meta-rugix-core:
      meta-rugix-nxp-imx-uboot:
